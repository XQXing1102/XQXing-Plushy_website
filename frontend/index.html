<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - XQXing-Plushy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="auth/auth.css">
</head>
<body>

<div class="dashboard-container">
  
  <header class="global-glass-header" style="grid-template-columns: 1fr auto 1fr;">
    <div class="header-left">
      <!-- Spacer for center alignment -->
    </div>
    
    <div class="header-center">
      <h2>✨ XQXing-Plushy</h2>
      <p>All online tools in one place</p>
    </div>
    
    <div class="header-right auth-profile">
      <span id="username-display" class="user-name"></span>
      <button class="nav-logout-btn icon-text-btn" onclick="logout()">
        <span>Logout</span>
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <main class="tools-grid">
    <a href="todo.html" class="tool-tile">
      <div class="tile-core"><span>📝 Smart Todo Manager</span></div>
    </a>
    <a href="pomodoro.html" class="tool-tile">
      <div class="tile-core"><span>🍅 Pomodoro Timer</span></div>
    </a>
    <a href="json-formatter.html" class="tool-tile">
      <div class="tile-core"><span>📄 JSON Formatter</span></div>
    </a>
    <a href="calculator.html" class="tool-tile">
      <div class="tile-core"><span>🧮 Scientific Calculator</span></div>
    </a>
  </main>

</div>

<script src="js/main.js"></script>
<script src="auth/auth.js"></script>
<script>
  if (!isLoggedIn()) {
    window.location.href = "auth/login.html";
  } else {
    document.getElementById("username-display").textContent = "Hi, " + getUsername();
    setTimeout(() => {
        document.querySelectorAll('.tool-tile, .glass-header').forEach(el => {
            el.classList.add('visible');
        });
    }, 100);
  }
</script>
</body>
</html>
