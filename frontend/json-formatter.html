<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter - XQXing-Plushy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="auth/auth.css">
  <link rel="stylesheet" href="css/json-formatter.css">
</head>
<body>

<div class="dashboard-container">
  
  <header class="global-glass-header" style="grid-template-columns: 1fr auto 1fr;">
    <div class="header-left">
      <a href="index.html" class="nav-back-btn icon-text-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Back</span>
      </a>
    </div>
    
    <div class="header-center">
      <h2>📄 JSON Formatter</h2>
    </div>
    
    <div class="header-right auth-profile">
      <span id="username-display" class="user-name"></span>
      <button class="nav-logout-btn icon-text-btn" onclick="logout()">
        <span>Logout</span>
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <main class="formatter-wrapper glass-panel">
    
    <div class="formatter-toolbar">
      <div class="toolbar-left">
        <button id="format-btn" class="control-btn primary-btn btn-sm">Format JSON</button>
        <button id="minify-btn" class="control-btn btn-sm">Minify</button>
        <button id="clear-btn" class="control-btn btn-sm" style="border-color: rgba(255, 59, 48, 0.4); color: #ff8e8e;">Clear</button>
      </div>
      <div class="toolbar-right">
        <span id="status-indicator" class="status-indicator">Ready</span>
        <button id="copy-btn" class="icon-text-btn">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          <span>Copy</span>
        </button>
      </div>
    </div>

    <div class="editor-panes">
      <div class="pane input-pane">
        <div class="pane-header">Input</div>
        <textarea id="json-input" placeholder="Paste your raw, messy, or minified JSON here..." spellcheck="false"></textarea>
      </div>
      
      <div class="pane-divider">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg>
      </div>

      <div class="pane output-pane">
        <div class="pane-header">Formatted Output</div>
        <div class="output-container">
          <pre id="json-output"></pre>
        </div>
      </div>
    </div>

  </main>

</div>

<script src="js/main.js"></script>
<script src="auth/auth.js"></script>
<script src="js/json-formatter.js"></script>
<script>
  if (!isLoggedIn()) {
    window.location.href = "auth/login.html";
  } else {
    document.getElementById("username-display").textContent = "Hi, " + getUsername();
    setTimeout(() => {
        document.querySelector('.formatter-wrapper').classList.add('visible');
    }, 100);
  }
</script>
</body>
</html>
