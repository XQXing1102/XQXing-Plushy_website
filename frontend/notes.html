<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes & Notebooks - XQXing-Plushy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="auth/auth.css">
  <link rel="stylesheet" href="css/notes.css">
  <!-- Quill Rich Text Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <!-- html2pdf for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="dashboard-container">
  
  <header class="global-glass-header" style="grid-template-columns: 1fr auto 1fr;">
    <div class="header-left">
      <a href="index.html" class="nav-back-btn icon-text-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Back</span>
      </a>
    </div>
    
    <div class="header-center">
      <h2>📓 Smart Notes</h2>
    </div>
    
    <div class="header-right auth-profile">
      <span id="username-display" class="user-name"></span>
      <button class="nav-logout-btn icon-text-btn" onclick="logout()">
        <span>Logout</span>
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <main class="notes-layout visible">
    
    <!-- Sidebar -->
    <aside class="notes-sidebar glass-panel">
      <!-- Notebook Selection -->
      <div class="notebook-section">
        <div class="sidebar-header">
          <h3>Notebooks</h3>
          <button id="new-notebook-btn" class="icon-btn" title="New Notebook">+</button>
        </div>
        <select id="notebook-select" class="glass-input"></select>
        <button id="del-notebook-btn" class="danger-text-btn" style="margin-top: 5px; width: 100%; border-radius: 8px;">Delete Notebook</button>
      </div>

      <!-- Sections & Notes -->
      <div class="sections-container">
        <div class="sidebar-header" style="margin-top: 20px;">
          <h3>Notes</h3>
          <button id="new-note-btn" class="icon-btn primary-icon" title="New Note">+</button>
        </div>
        
        <div id="notes-list-container" class="notes-list">
            <!-- Populated via JS -->
        </div>
      </div>
    </aside>

    <!-- Editor -->
    <section class="notes-editor glass-panel">
      
      <div class="editor-toolbar-top">
        <input type="text" id="note-title" placeholder="Note Title..." class="glass-input title-input">
        <input type="text" id="note-section" placeholder="Section (e.g., General)" class="glass-input section-input">
        
        <div class="editor-actions">
           <button id="save-note-btn" class="control-btn primary-btn">Save</button>
           <button id="export-pdf-btn" class="control-btn" title="Export to PDF">📄 PDF</button>
           <button id="export-word-btn" class="control-btn" title="Export to Word">📝 Word</button>
           <button id="del-note-btn" class="control-btn danger-btn" title="Delete Note">🗑️</button>
        </div>
      </div>

      <div class="editor-wrapper">
        <div id="quill-editor"></div>
      </div>

      <!-- Auto-save indicator -->
      <div id="save-indicator" class="save-indicator">All changes saved</div>

    </section>

  </main>
</div>

<!-- Scripts -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="js/main.js"></script>
<script src="auth/auth.js"></script>
<script src="js/notes.js"></script>
<script>
  if (!isLoggedIn()) {
    window.location.href = "auth/login.html";
  } else {
    document.getElementById("username-display").textContent = "Hi, " + getUsername();
  }
</script>

</body>
</html>
