<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer - XQXing-Plushy</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="auth/auth.css">
  <link rel="stylesheet" href="css/pomodoro.css">
</head>
<body>

<div class="dashboard-container">
  
  <header class="global-glass-header" style="grid-template-columns: 1fr auto 1fr;">
    <div class="header-left">
      <a href="index.html" class="nav-back-btn icon-text-btn">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>Back</span>
      </a>
    </div>
    
    <div class="header-center">
      <h2>🍅 Pomodoro Timer</h2>
    </div>
    
    <div class="header-right auth-profile">
      <span id="username-display" class="user-name"></span>
      <button class="nav-logout-btn icon-text-btn" onclick="logout()">
        <span>Logout</span>
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
  </header>

  <main class="pomodoro-wrapper">
    <div class="timer-container glass-panel">
      
      <div class="timer-modes">
        <button class="mode-btn active" data-mode="pomodoro">Pomodoro</button>
        <button class="mode-btn" data-mode="shortBreak">Short Break</button>
        <button class="mode-btn" data-mode="longBreak">Long Break</button>
      </div>
      
      <div class="timer-display">
        <div class="glow-ring"></div>
        <svg class="progress-ring" width="300" height="300">
          <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.08)" stroke-width="12" fill="transparent" r="135" cx="150" cy="150"/>
          <circle id="progress-circle" class="progress-ring__circle" stroke="#ff6b6b" stroke-width="12" fill="transparent" stroke-linecap="round" r="135" cx="150" cy="150"/>
        </svg>
        <div class="time-text" id="time-display">25:00</div>
        <div class="mode-text" id="mode-display">Focus Mode</div>
      </div>
      
      <div class="timer-controls">
        <button class="control-btn primary-btn" id="start-btn">START</button>
        <button class="control-btn" id="pause-btn" style="display:none;">PAUSE</button>
        <button class="icon-btn" id="reset-btn" title="Reset Timer">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        </button>
      </div>
      
    </div>

    <div class="bottom-section">
      <div class="stats-container glass-panel">
        <div class="stats-header">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v-6M6 20V10M18 20V4"></path></svg>
          <h3>Today's Stats</h3>
        </div>
        <div class="stats-grid">
          <div class="stat-box">
            <span class="stat-value" id="pomodoros-count">0</span>
            <span class="stat-label">Pomodoros</span>
          </div>
          <div class="stat-box">
            <span class="stat-value" id="focus-time">0m</span>
            <span class="stat-label">Focus Time</span>
          </div>
        </div>
      </div>
      
      <button class="settings-btn glass-panel" id="settings-open-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Settings</span>
      </button>
    </div>

  </main>

  <!-- Settings Modal -->
  <div class="modal" id="settings-modal" style="display:none;">
    <div class="modal-content glass-panel">
      <div class="modal-header">
        <h2>Timer Settings</h2>
        <button class="icon-btn" id="settings-close-x">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="settings-body">
        <div class="setting-group">
          <label>Pomodoro (min)</label>
          <input type="number" id="setting-pomodoro" value="25" min="1" max="90" class="glass-input">
        </div>
        <div class="setting-group">
          <label>Short Break (min)</label>
          <input type="number" id="setting-shortBreak" value="5" min="1" max="30" class="glass-input">
        </div>
        <div class="setting-group">
          <label>Long Break (min)</label>
          <input type="number" id="setting-longBreak" value="15" min="1" max="60" class="glass-input">
        </div>
      </div>

      <div class="modal-actions">
        <button class="control-btn primary-btn" id="save-settings-btn">Save</button>
      </div>
    </div>
  </div>

</div>

<script src="js/main.js"></script>
<script src="auth/auth.js"></script>
<script src="js/pomodoro.js"></script>
<script>
  if (!isLoggedIn()) {
    window.location.href = "auth/login.html";
  } else {
    document.getElementById("username-display").textContent = "Hi, " + getUsername();
    setTimeout(() => {
        document.querySelectorAll('.pomodoro-wrapper, .glass-header').forEach(el => {
            el.classList.add('visible');
        });
    }, 100);
  }
</script>
</body>
</html>
